name: Tauri Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      tag:
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    name: Build macOS .dmg (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile=false

      # Build the unsigned Tauri app.
      # The webview is a thin shell pointing at https://app.anvil-dev.com.
      # No Apple signing or notarization — users will see Gatekeeper warnings
      # and need to right-click → Open the first time. This is a prototype;
      # buy an Apple Developer account before shipping to non-technical users.
      - name: Build Tauri app (universal binary, unsigned)
        working-directory: apps/desktop
        run: |
          pnpm dlx @tauri-apps/cli build --target universal-apple-darwin

      - name: Rename .dmg with tag/sha
        id: rename
        run: |
          SUFFIX="${{ inputs.tag || github.sha }}"
          SRC=$(ls apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          DEST="$(dirname "$SRC")/Anvil-${SUFFIX}.dmg"
          mv "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anvil-${{ inputs.tag || github.sha }}.dmg
          path: ${{ steps.rename.outputs.path }}
          retention-days: ${{ inputs.tag && 90 || 7 }}
          if-no-files-found: error
