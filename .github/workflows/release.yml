name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Build unsigned .dmg
  build:
    uses: ./.github/workflows/tauri-build.yml
    with:
      tag: ${{ github.ref_name }}

  # Create GitHub release + upload .dmg as a release asset.
  # (No S3 / CDN — GitHub Releases is the canonical download target for now.)
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download .dmg artifact
        uses: actions/download-artifact@v4
        with:
          name: Anvil-${{ github.ref_name }}.dmg
          path: dist/

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
            });
            return data.body;
          result-encoding: string

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Anvil ${{ github.ref_name }}
          body: |
            ${{ steps.notes.outputs.result }}

            ---

            **Heads up:** this build is **unsigned**. macOS Gatekeeper will block it the first time you try to open it. To install:

            1. Download `Anvil-${{ github.ref_name }}.dmg` below
            2. Drag Anvil.app to your Applications folder
            3. **Right-click** the app and choose **Open** (don't double-click)
            4. Click **Open** on the warning dialog

            You only need to do this once per install. Future launches work normally.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*.dmg
